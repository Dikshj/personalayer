<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PersonaLayer</title>
  <meta name="description" content="PersonaLayer production control center for local persona memory, raw vault review, egress previews, permissions, and audit logs.">
  <link rel="stylesheet" href="/dashboard/style.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" aria-label="Primary">
      <a class="brand" href="/dashboard/" aria-label="PersonaLayer home">
        <span class="brand-mark" aria-hidden="true">PL</span>
        <span>
          <strong>PersonaLayer</strong>
          <small>Local context control</small>
        </span>
      </a>

      <nav class="nav-list" aria-label="Dashboard views">
        <button class="nav-item active" type="button" data-view="overview">Overview</button>
        <button class="nav-item" type="button" data-view="vault">Raw Vault</button>
        <button class="nav-item" type="button" data-view="egress">Egress Preview</button>
        <button class="nav-item" type="button" data-view="memory">Memory</button>
        <button class="nav-item" type="button" data-view="permissions">Permissions</button>
        <button class="nav-item" type="button" data-view="connectors">Connectors</button>
        <button class="nav-item" type="button" data-view="audit">Audit</button>
        <button class="nav-item" type="button" data-view="developer">Developer</button>
      </nav>

      <div class="sidebar-footer">
        <span class="status-dot" id="daemon-dot"></span>
        <span id="daemon-label">Checking daemon</span>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <p class="eyebrow" id="view-eyebrow">Production Control Center</p>
          <h1 id="view-title">Overview</h1>
        </div>
        <div class="topbar-actions">
          <label class="user-switch">
            <span>User</span>
            <input id="user-id" type="text" value="local_user" autocomplete="off">
          </label>
          <button class="button ghost" id="refresh-button" type="button">Refresh</button>
          <button class="button primary" id="daily-refresh-button" type="button">Run Daily Refresh</button>
        </div>
      </header>

      <section class="notice" id="notice" role="status" aria-live="polite"></section>
      <section class="view" id="view"></section>
    </main>
  </div>

  <template id="empty-template">
    <div class="empty-state">
      <strong>No data yet</strong>
      <p>Connect an integration, ingest SDK events, or run a refresh to populate this view.</p>
    </div>
  </template>

  <script src="/dashboard/app.js" type="module"></script>
</body>
</html>
