name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r backend/requirements.txt
      - run: pytest tests/ -q -n 4

  js-sdk-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: cd sdk/javascript && npm install
      - run: cd sdk/javascript && npm run build

  extension-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/package-chrome.sh
      - uses: actions/upload-artifact@v4
        with:
          name: chrome-extension
          path: build/personalayer-chrome.zip

  supabase-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - run: supabase db start
      - run: supabase db lint
      - run: pytest tests/test_supabase_schema.py

  swift-build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: swift-actions/setup-swift@v2
      - run: cd native/macos/PersonalLayer && swift package resolve
      - run: cd native/macos/PersonalLayer && swift build
      - run: cd sdk/swift && swift build
