<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PCL Feature Ranking Demo</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f7f7f4;
      color: #1d1d1b;
    }
    .shell {
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr);
      min-height: 100vh;
    }
    aside {
      border-right: 1px solid #d8d8d2;
      padding: 18px;
      background: #efefea;
    }
    main { padding: 22px; }
    h1 {
      margin: 0 0 8px;
      font-size: 19px;
      letter-spacing: 0;
    }
    .muted { color: #6d6d66; font-size: 13px; line-height: 1.45; }
    .status {
      margin-top: 18px;
      border: 1px solid #d8d8d2;
      background: #fbfbf8;
      border-radius: 8px;
      padding: 12px;
      font-size: 12px;
      color: #4f4f49;
      min-height: 74px;
      white-space: pre-wrap;
    }
    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }
    button {
      border: 1px solid #b9b9b0;
      background: #fff;
      border-radius: 6px;
      padding: 8px 10px;
      cursor: pointer;
      font-size: 13px;
      color: #1d1d1b;
    }
    button:hover { border-color: #77776e; }
    button.primary {
      background: #1d1d1b;
      border-color: #1d1d1b;
      color: #fff;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
    }
    .feature {
      border: 1px solid #d8d8d2;
      border-radius: 8px;
      background: #fff;
      padding: 14px;
      min-height: 150px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .feature.hidden-by-pcl {
      opacity: .35;
      filter: grayscale(1);
    }
    .feature h2 {
      margin: 0;
      font-size: 15px;
      letter-spacing: 0;
    }
    .rank {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      display: inline-grid;
      place-items: center;
      background: #e6e6df;
      font-size: 12px;
      font-weight: 700;
    }
    .score {
      font-size: 12px;
      color: #575750;
    }
    .reasons {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
      margin-top: auto;
    }
    .reason {
      font-size: 11px;
      border: 1px solid #deded8;
      border-radius: 999px;
      padding: 2px 7px;
      color: #575750;
      background: #f7f7f4;
    }
    pre {
      overflow: auto;
      border: 1px solid #d8d8d2;
      border-radius: 8px;
      background: #fff;
      padding: 12px;
      font-size: 12px;
      max-height: 300px;
    }
    @media (max-width: 760px) {
      .shell { grid-template-columns: 1fr; }
      aside { border-right: none; border-bottom: 1px solid #d8d8d2; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside>
      <h1>PCL SDK Demo</h1>
      <p class="muted">
        This page registers a demo app, emits sample feature usage, asks PCL for a decision bundle, then renders the UI in ranked order.
      </p>
      <div class="status" id="status">Ready.</div>
    </aside>
    <main>
      <div class="toolbar">
        <button class="primary" id="run">Run Personalization</button>
        <button id="usage">Emit More Kanban Usage</button>
      </div>
      <div class="grid" id="features"></div>
      <h1 style="margin-top:24px;">Decision Bundle</h1>
      <pre id="bundle">{}</pre>
    </main>
  </div>

  <script type="module">
    import {PersonalContextLayer} from "../personal-context-layer.js";

    const pcl = new PersonalContextLayer({appId: "sdk_demo_app"});
    const userId = "demo_user";
    const features = [
      {feature_id: "kanban", name: "Kanban Board", category: "planning"},
      {feature_id: "calendar", name: "Calendar", category: "planning"},
      {feature_id: "ai_summary", name: "AI Summary", category: "assistant"},
      {feature_id: "automation_rules", name: "Automation Rules", category: "power_user"},
    ];

    const status = document.getElementById("status");
    const featureRoot = document.getElementById("features");
    const bundleRoot = document.getElementById("bundle");

    document.getElementById("run").addEventListener("click", runPersonalization);
    document.getElementById("usage").addEventListener("click", async () => {
      await safe("trackFeature", () => pcl.trackFeature({
        userId,
        featureId: "kanban",
        featureName: "Kanban Board",
        weight: 1.5,
      }));
      await runPersonalization();
    });

    async function runPersonalization() {
      await safe("registerApp", () => pcl.registerApp({
        name: "SDK Demo App",
        allowedLayers: ["identity_role", "capability_signals", "active_context", "explicit_preferences"],
      }));

      const bundle = await safe("personalize", () => pcl.personalize({
        userId,
        requestedLayers: ["capability_signals", "active_context", "explicit_preferences"],
        features,
      }));

      if (bundle) {
        renderFeatures(bundle.ranked_features || []);
        bundleRoot.textContent = JSON.stringify(bundle, null, 2);
      }
    }

    function renderFeatures(rankedFeatures) {
      const byId = new Map(rankedFeatures.map(feature => [feature.feature_id, feature]));
      const ordered = [...features].sort((a, b) => {
        const rankA = byId.get(a.feature_id)?.rank || 999;
        const rankB = byId.get(b.feature_id)?.rank || 999;
        return rankA - rankB;
      });

      featureRoot.innerHTML = ordered.map(feature => {
        const decision = byId.get(feature.feature_id);
        const hidden = decision && decision.score < 0;
        const reasons = decision?.reason_codes || ["not_returned"];
        return `
          <section class="feature ${hidden ? "hidden-by-pcl" : ""}">
            <div><span class="rank">${decision?.rank || "-"}</span></div>
            <h2>${feature.name}</h2>
            <div class="score">Score: ${decision?.score ?? "n/a"} | Confidence: ${decision?.confidence ?? "n/a"}</div>
            <div class="reasons">${reasons.map(reason => `<span class="reason">${reason}</span>`).join("")}</div>
          </section>
        `;
      }).join("");
    }

    async function safe(label, fn) {
      try {
        status.textContent = `${label}...`;
        const result = await fn();
        status.textContent = `${label} ok`;
        return result;
      } catch (error) {
        status.textContent = `${label} failed: ${error.message}\nStart the daemon on http://127.0.0.1:7823`;
        return null;
      }
    }

    renderFeatures([]);
  </script>
</body>
</html>
