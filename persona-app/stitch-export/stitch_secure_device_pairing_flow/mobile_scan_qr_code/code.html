<!DOCTYPE html>

<html class="light" lang="en"><head>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    
    @keyframes scan-line {
      0% { transform: translateY(0); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(240px); opacity: 0; }
    }
    
    .scanning-line {
      animation: scan-line 3s infinite linear;
    }

    .viewfinder-mask {
      box-shadow: 0 0 0 1000px rgba(0, 0, 0, 0.6);
    }
    
    .corner-border {
      position: absolute;
      width: 32px;
      height: 32px;
      border-color: #ffffff;
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-black font-body-md text-on-surface overflow-hidden h-screen flex flex-col">
<!-- Header: TopAppBar Implementation -->
<header class="flex justify-between items-center w-full px-margin-mobile h-16 bg-transparent absolute top-0 left-0 z-50">
<div class="flex items-center gap-4">
<button class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-surface-container-low transition-colors text-white active:opacity-80">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md text-white font-bold">Pair Device</h1>
</div>
<div class="flex items-center gap-2">
<button class="p-2 text-white hover:bg-surface-container-low rounded-full transition-colors active:opacity-80">
<span class="material-symbols-outlined">help</span>
</button>
<button class="p-2 text-white hover:bg-surface-container-low rounded-full transition-colors active:opacity-80">
<span class="material-symbols-outlined">settings</span>
</button>
</div>
</header>
<!-- Camera Viewfinder Content -->
<main class="relative flex-1 flex flex-col items-center justify-center">
<!-- Background "Camera Stream" Placeholder -->
<div class="absolute inset-0 z-0">
<img alt="Server Room" class="w-full h-full object-cover grayscale opacity-40" data-alt="A high-tech server room background viewed through a digital camera lens, featuring rows of blinking blue and white LED lights on server racks. The scene is shot with a professional cinematic depth of field, creating a blurred industrial aesthetic. The color palette is dominated by cool grays and deep blacks, evoking a sense of high-security infrastructure and professional technical environments. Lighting is dim and focused, emphasizing the reliable and precise nature of the facility." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAwPQqJCDDJbXzyYKJ_JpJN5B_A2JIPseVIzeL4ENKsONHvil48yhQH0LK1Xc391ocgHPbF24J8jVTqmJBqttxy6lE-XN8zxcUuMdoI6LC_28lmJM5cc6CDmGSR7YsCtKtVrLeM7hFl9v1Fc-W4Wh8D9KMUS0qcSfHYwfwrs_Kg5NozDwm0CpRAE7bXO7mSsghjVsIhagVbpddNv7vF2t_5dU7JrqT5nHUMcLLwbvDlZFSSSTSGaA5ol3Elm2XKko6zXK66oy25BWc"/>
</div>
<!-- Instruction Text -->
<div class="absolute top-24 w-full text-center px-8 z-20">
<p class="text-white font-headline-md text-headline-md mb-2">Scan QR Code</p>
<p class="text-surface-variant font-label-sm text-label-sm max-w-xs mx-auto">Position the code on your secondary device within the frame below to begin pairing.</p>
</div>
<!-- Scanning Square Overlay -->
<div class="relative z-20 w-[280px] h-[280px] flex items-center justify-center">
<!-- Masking layer using box-shadow -->
<div class="absolute inset-0 viewfinder-mask rounded-xl border border-white/20 pointer-events-none"></div>
<!-- Scanning Square Visuals -->
<div class="absolute inset-0 rounded-xl overflow-hidden pointer-events-none">
<!-- Corners -->
<div class="corner-border top-0 left-0 border-t-4 border-l-4"></div>
<div class="corner-border top-0 right-0 border-t-4 border-r-4"></div>
<div class="corner-border bottom-0 left-0 border-b-4 border-l-4"></div>
<div class="corner-border bottom-0 right-0 border-b-4 border-r-4"></div>
<!-- Animated Scanning Line -->
<div class="scanning-line absolute top-0 left-0 w-full h-[2px] bg-gradient-to-r from-transparent via-secondary-container to-transparent shadow-[0_0_15px_rgba(108,248,187,0.8)]"></div>
</div>
<!-- Target Sight -->
<div class="w-12 h-12 border border-white/10 rounded-full flex items-center justify-center">
<div class="w-1 h-1 bg-white/30 rounded-full"></div>
</div>
</div>
<!-- Fallback Flow Footer -->
<div class="absolute bottom-32 w-full px-margin-mobile z-20 flex flex-col items-center">
<button class="w-full py-4 bg-primary text-white font-headline-md text-headline-md font-bold rounded-xl shadow-lg active:scale-95 transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined">dialpad</span>
        Enter Code Manually
      </button>
<p class="mt-4 text-surface-variant font-label-sm text-label-sm">Having trouble? Tap for alternative methods.</p>
</div>
</main>
<!-- Bottom Navigation Shell (Consistent with Shell Visibility & Relevance Policy) -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center h-20 pb-safe bg-surface dark:bg-inverse-surface border-t border-outline-variant">
<a class="flex flex-col items-center justify-center bg-secondary-container text-on-secondary-container rounded-full px-4 py-1 Active: scale-95 transition-transform duration-150" href="#">
<span class="material-symbols-outlined" data-icon="qr_code_scanner">qr_code_scanner</span>
<span class="font-label-sm text-label-sm">Scan</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-1 hover:bg-surface-container-high transition-colors" href="#">
<span class="material-symbols-outlined" data-icon="dialpad">dialpad</span>
<span class="font-label-sm text-label-sm">Manual</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-1 hover:bg-surface-container-high transition-colors" href="#">
<span class="material-symbols-outlined" data-icon="history">history</span>
<span class="font-label-sm text-label-sm">History</span>
</a>
</nav>
<!-- Micro-interaction Script -->
<script>
    // Handle the haptic-like feel on button interactions
    document.querySelectorAll('button, a').forEach(elem => {
      elem.addEventListener('mousedown', () => {
        if ('vibrate' in navigator) {
          navigator.vibrate(5);
        }
      });
    });

    // Minimal animation for the instruction text appearance
    window.addEventListener('DOMContentLoaded', () => {
      const mainContent = document.querySelector('main');
      mainContent.style.opacity = '0';
      mainContent.style.transition = 'opacity 0.8s ease-out';
      setTimeout(() => {
        mainContent.style.opacity = '1';
      }, 100);
    });
  </script>
</body></html>
