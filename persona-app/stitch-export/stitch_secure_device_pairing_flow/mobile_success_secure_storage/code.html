<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
            "surface-bright": "#f7f9fb",
            "surface-dim": "#d8dadc",
            "tertiary-container": "#5e6e85",
            "on-tertiary-fixed": "#0b1c30",
            "surface-container-high": "#e6e8ea",
            "secondary-fixed": "#6ffbbe",
            "on-error": "#ffffff",
            "primary-fixed-dim": "#b4c5ff",
            "surface-variant": "#e0e3e5",
            "on-primary-fixed": "#00174b",
            "secondary-container": "#6cf8bb",
            "surface-container-low": "#f2f4f6",
            "secondary": "#006c49",
            "tertiary-fixed": "#d3e4fe",
            "on-background": "#191c1e",
            "on-surface": "#191c1e",
            "error-container": "#ffdad6",
            "inverse-on-surface": "#eff1f3",
            "on-primary-container": "#eeefff",
            "on-secondary": "#ffffff",
            "surface-container": "#eceef0",
            "surface-tint": "#0053db",
            "surface-container-lowest": "#ffffff",
            "on-secondary-fixed-variant": "#005236",
            "on-tertiary-container": "#e9f0ff",
            "surface-container-highest": "#e0e3e5",
            "inverse-surface": "#2d3133",
            "tertiary-fixed-dim": "#b7c8e1",
            "error": "#ba1a1a",
            "primary-fixed": "#dbe1ff",
            "tertiary": "#46566c",
            "on-primary-fixed-variant": "#003ea8",
            "primary-container": "#2563eb",
            "on-surface-variant": "#434655",
            "on-secondary-container": "#00714d",
            "on-error-container": "#93000a",
            "outline-variant": "#c3c6d7",
            "primary": "#004ac6",
            "outline": "#737686",
            "on-tertiary-fixed-variant": "#38485d",
            "inverse-primary": "#b4c5ff",
            "on-tertiary": "#ffffff",
            "on-secondary-fixed": "#002113",
            "surface": "#f7f9fb",
            "on-primary": "#ffffff",
            "secondary-fixed-dim": "#4edea3",
            "background": "#f7f9fb"
          },
          "borderRadius": {
            "DEFAULT": "0.125rem",
            "lg": "0.25rem",
            "xl": "0.5rem",
            "full": "0.75rem"
          },
          "spacing": {
            "unit": "4px",
            "stack-sm": "8px",
            "margin-desktop": "32px",
            "gutter": "16px",
            "margin-mobile": "20px",
            "stack-md": "16px",
            "stack-lg": "32px"
          },
          "fontFamily": {
            "headline-lg": ["Inter"],
            "headline-md": ["Inter"],
            "body-md": ["Inter"],
            "body-lg": ["Inter"],
            "headline-lg-mobile": ["Inter"],
            "label-sm": ["Inter"],
            "code-display": ["JetBrains Mono"]
          },
          "fontSize": {
            "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
            "headline-md": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
            "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
            "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
            "headline-lg-mobile": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
            "label-sm": ["14px", {"lineHeight": "20px", "fontWeight": "500"}],
            "code-display": ["36px", {"lineHeight": "44px", "letterSpacing": "0.1em", "fontWeight": "600"}]
          }
        },
      },
    }
  </script>
<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    body {
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior-y: contain;
    }
    .success-pulse {
      animation: pulse-ring 2s cubic-bezier(0.455, 0.03, 0.515, 0.955) infinite;
    }
    @keyframes pulse-ring {
      0% { transform: scale(0.8); opacity: 0.5; }
      50% { transform: scale(1.1); opacity: 0.2; }
      100% { transform: scale(0.8); opacity: 0.5; }
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body-md min-h-screen flex flex-col">
<!-- Shared Component: TopAppBar -->
<header class="flex justify-between items-center w-full px-margin-mobile md:px-margin-desktop h-16 bg-surface dark:bg-inverse-surface border-b border-outline-variant dark:border-outline fixed top-0 z-50">
<div class="font-headline-md text-headline-md font-bold text-primary dark:text-primary-fixed-dim">SecureSync</div>
<div class="flex gap-4">
<span class="material-symbols-outlined text-on-surface-variant cursor-pointer active:opacity-80 transition-colors hover:bg-surface-container-low" data-icon="help">help</span>
<span class="material-symbols-outlined text-on-surface-variant cursor-pointer active:opacity-80 transition-colors hover:bg-surface-container-low" data-icon="settings">settings</span>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-center px-margin-mobile pt-16 pb-20 overflow-y-auto">
<!-- Success Graphic Container -->
<div class="relative flex items-center justify-center mb-stack-lg">
<div class="absolute w-48 h-48 bg-secondary-container opacity-20 rounded-full success-pulse"></div>
<div class="relative z-10 w-32 h-32 bg-secondary rounded-full flex items-center justify-center shadow-sm border border-outline-variant/20">
<span class="material-symbols-outlined text-on-secondary text-[64px]" data-icon="verified_user" style="font-variation-settings: 'FILL' 1;">verified_user</span>
</div>
</div>
<!-- Content Stack -->
<div class="text-center max-w-sm w-full space-y-stack-md">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface tracking-tight">Device Paired Successfully</h1>
<p class="font-body-md text-body-md text-on-surface-variant leading-relaxed">
        Your private keys are now securely stored in your device's Secure Enclave.
      </p>
</div>
<!-- Security Info Card (Bento Grid Style Influence) -->
<div class="mt-stack-lg w-full max-w-sm grid grid-cols-1 gap-unit">
<div class="bg-surface-container-low border border-outline-variant p-gutter rounded-xl flex items-center gap-4">
<div class="w-10 h-10 rounded-lg bg-surface-bright border border-outline-variant flex items-center justify-center text-primary">
<span class="material-symbols-outlined" data-icon="key">key</span>
</div>
<div class="flex flex-col">
<span class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider">Storage Mode</span>
<span class="font-body-md text-body-md font-semibold text-on-surface">Hardware Encrypted</span>
</div>
</div>
<div class="bg-surface-container-low border border-outline-variant p-gutter rounded-xl flex items-center gap-4">
<div class="w-10 h-10 rounded-lg bg-surface-bright border border-outline-variant flex items-center justify-center text-secondary">
<span class="material-symbols-outlined" data-icon="sync">sync</span>
</div>
<div class="flex flex-col">
<span class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider">Sync Status</span>
<span class="font-body-md text-body-md font-semibold text-on-surface">Real-time Active</span>
</div>
</div>
</div>
<!-- Action Buttons -->
<div class="mt-stack-lg w-full max-w-sm space-y-stack-sm">
<button class="w-full h-12 bg-primary text-on-primary font-body-md font-bold rounded-xl active:scale-95 transition-transform duration-150 flex items-center justify-center gap-2">
        Get Started
        <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
<button class="w-full h-12 border border-outline text-primary font-body-md font-semibold rounded-xl active:scale-95 transition-transform duration-150">
        Manage Devices
      </button>
</div>
<!-- Badge -->
<div class="mt-stack-lg flex items-center gap-2 bg-secondary-container/30 px-3 py-1.5 rounded-full border border-secondary/20">
<span class="w-2 h-2 bg-secondary rounded-full animate-pulse"></span>
<span class="font-label-sm text-label-sm text-on-secondary-container font-semibold">Secure Sync Active</span>
</div>
</main>
<!-- Shared Component: BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center h-20 pb-safe bg-surface dark:bg-inverse-surface border-t border-outline-variant dark:border-outline shadow-sm">
<!-- Scan -->
<div class="flex flex-col items-center justify-center text-on-surface-variant dark:text-surface-variant px-4 py-1 hover:bg-surface-container-high transition-colors cursor-pointer active:scale-95 duration-150">
<span class="material-symbols-outlined" data-icon="qr_code_scanner">qr_code_scanner</span>
<span class="font-label-sm text-label-sm">Scan</span>
</div>
<!-- Manual -->
<div class="flex flex-col items-center justify-center text-on-surface-variant dark:text-surface-variant px-4 py-1 hover:bg-surface-container-high transition-colors cursor-pointer active:scale-95 duration-150">
<span class="material-symbols-outlined" data-icon="dialpad">dialpad</span>
<span class="font-label-sm text-label-sm">Manual</span>
</div>
<!-- History (Active) -->
<div class="flex flex-col items-center justify-center bg-secondary-container dark:bg-on-secondary-fixed-variant text-on-secondary-container dark:text-secondary-fixed rounded-full px-4 py-1 cursor-pointer active:scale-95 transition-transform duration-150">
<span class="material-symbols-outlined" data-icon="history" style="font-variation-settings: 'FILL' 1;">history</span>
<span class="font-label-sm text-label-sm">History</span>
</div>
</nav>
<script>
    // Micro-interaction: Ripple effect on buttons
    document.querySelectorAll('button').forEach(button => {
      button.addEventListener('click', function(e) {
        let x = e.clientX - e.target.offsetLeft;
        let y = e.clientY - e.target.offsetTop;
        let ripples = document.createElement('span');
        ripples.style.left = x + 'px';
        ripples.style.top = y + 'px';
        this.appendChild(ripples);
        setTimeout(() => ripples.remove(), 1000);
      });
    });

    // Theme detection logic (basic)
    if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
      // document.documentElement.classList.add('dark'); // Manual override if needed
    }
  </script>
</body></html>
