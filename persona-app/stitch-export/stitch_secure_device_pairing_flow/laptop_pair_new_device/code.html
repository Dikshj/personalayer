<span class="w-1 h-1 bg-outline-variant rounded-full"></span>
<span>Session ID: FS-992-KLA</span>

<script>
    // Simple logic for the countdown circle
    let timeLeft = 120; // 2 minutes
    const textDisplay = document.getElementById('countdown-text');
    const timerCircle = document.getElementById('timer-path');
    
    function updateTimer() {
      const minutes = Math.floor(timeLeft / 60);
      const seconds = timeLeft % 60;
      textDisplay.textContent = `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
      
      // Update SVG dash offset
      const offset = (timeLeft / 120) * 100;
      timerCircle.style.strokeDashoffset = 100 - offset;
      
      if (timeLeft > 0) {
        timeLeft--;
      } else {
        // Logic to refresh or show expired state could go here
        timeLeft = 120;
      }
    }

    setInterval(updateTimer, 1000);
    updateTimer();
  </script>
